<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Money Pro Analytics</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
  :root {
    --bg: #050508;
    --text: #e8e8f0;
    --text-dim: #cbd5e1;
    --green: #34d399;
    --red: #fb7185;
    --blue: #60a5fa;
    --gold: #fbbf24;
    --purple: #c084fc;
    --font-display: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }

  [data-theme="light"] {
    --bg: #f8fafc;
    --text: #0f172a;
    --text-dim: #334155;
  }

  body {
    font-family: var(--font-body);
    color: var(--text);
    margin: 0;
    padding: 0;
    background-color: var(--bg);
    min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
  }

  #app-background {
    position: fixed; inset: 0; z-index: -2; 
    background-size: cover; background-position: center; 
    background-attachment: fixed;
    background-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop');
    transition: opacity 0.3s;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
    padding-bottom: 120px;
  }

  .glass-panel {
    background: rgba(15, 15, 25, 0.65);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
  }

  [data-theme="light"] .glass-panel {
    background: rgba(255, 255, 255, 0.8);
    border-color: rgba(0,0,0,0.1);
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 16px;
  }

  .title {
    font-family: var(--font-display);
    font-size: 24px;
    font-weight: 800;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
    width: 100%;
    justify-content: flex-end;
  }

  select, .btn, input[type="date"] {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 12px;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 600;
    outline: none;
    cursor: pointer;
    backdrop-filter: blur(10px);
  }

  [data-theme="light"] select, [data-theme="light"] .btn, [data-theme="light"] input[type="date"] {
    background: rgba(0,0,0,0.05);
    border-color: rgba(0,0,0,0.1);
  }

  select option { background: #12121c; color: #fff; }
  [data-theme="light"] select option { background: #ffffff; color: var(--text); }
  
  input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.6; cursor: pointer; }
  [data-theme="light"] input[type="date"]::-webkit-calendar-picker-indicator { filter: none; }

  .dashboard-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 20px;
    margin-bottom: 20px;
  }

  .chart-container {
    position: relative;
    height: 300px;
    width: 100%;
  }

  .chart-title {
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 16px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    background: rgba(5, 5, 8, 0.6);
    backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    border-top: 1px solid rgba(255,255,255,0.08);
    padding: 10px 8px; padding-bottom: max(10px, env(safe-area-inset-bottom));
    display: flex; align-items: center; justify-content: space-around;
  }
  [data-theme="light"] .bottom-nav {
    background: rgba(248, 250, 252, 0.8);
    border-color: rgba(0,0,0,0.1);
  }
  .nav-item {
    display: flex; flex-direction: column; align-items: center; gap: 3px; 
    cursor: pointer; padding: 6px 12px; border-radius: 12px; 
    transition: all 0.2s; min-width: 52px; text-decoration: none;
  }
  .nav-item .nav-icon { font-size: 17px; color: #94a3b8; transition: all 0.2s; }
  .nav-item .nav-label { font-size: 9px; font-weight: 700; color: #94a3b8; letter-spacing: 0.05em; text-transform: uppercase; transition: all 0.2s; }
  
  .nav-item.active .nav-icon, .nav-item.active .nav-label { color: var(--gold); }
  .nav-item:not(.active):hover .nav-icon, .nav-item:not(.active):hover .nav-label { color: var(--blue); }
  
  .nav-fab {
    width: 50px; height: 50px; border-radius: 50%;
    background: linear-gradient(135deg, var(--blue), var(--purple));
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 20px; cursor: pointer; text-decoration: none;
    box-shadow: 0 8px 24px rgba(96,165,250,0.4); border: none; outline: none; transform: translateY(-4px);
  }
  .nav-fab:hover { transform: translateY(-8px) scale(1.05); }

  #loader {
    position: fixed; inset: 0; z-index: 500;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(5,5,8,0.8); backdrop-filter: blur(10px);
  }
  .spinner {
    width: 50px; height: 50px;
    border: 4px solid rgba(255,255,255,0.1);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-bottom: 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (min-width: 768px) {
    .bottom-nav { display: none; }
    .container { padding-bottom: 40px; }
  }

</style>
</head>
<body>

<div id="app-background"></div>

<div id="loader">
  <div class="spinner"></div>
  <h2 style="font-family: var(--font-display);">Syncing Latest Data...</h2>
</div>

<div class="container" style="display: none;" id="main-content">
  <div class="glass-panel header">
    <div class="title"><i class="fa-solid fa-chart-pie" style="color: var(--gold);"></i> Analytics</div>
    <div class="controls">
      <select id="userFilter" onchange="applyFilters()">
        <option value="all">All Users</option>
      </select>
      <select id="catFilter" onchange="applyFilters()">
        <option value="all">All Categories</option>
      </select>
      <select id="timeFilter" onchange="toggleCustomDate(); applyFilters()">
        <option value="all">All Time</option>
        <option value="year">This Year</option>
        <option value="month" selected>This Month</option>
        <option value="week">This Week</option>
        <option value="day">Today</option>
        <option value="custom">Custom Range</option>
      </select>
      <button class="btn desktop-only" onclick="window.location.href='index.html'" style="color: var(--blue); border-color: rgba(96,165,250,0.3);"><i class="fa-solid fa-arrow-left"></i> Home</button>
      
      <div id="customDateContainer" style="display: none; gap: 8px; align-items: center; margin-top: 10px; width: 100%; justify-content: flex-end;">
        <span style="font-size: 12px; font-weight: 700; color: var(--text-dim); text-transform: uppercase;">From:</span>
        <input type="date" id="startDate" onchange="applyFilters()">
        <span style="font-size: 12px; font-weight: 700; color: var(--text-dim); text-transform: uppercase;">To:</span>
        <input type="date" id="endDate" onchange="applyFilters()">
      </div>
    </div>
  </div>

  <div class="dashboard-grid" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
    <div class="glass-panel" style="border-left: 4px solid var(--green); padding: 15px;">
      <div class="chart-title" style="font-size:12px; margin-bottom:8px;">Total Income</div>
      <div style="font-size: 24px; font-weight: 800; color: var(--green);">₹<span id="sumIncome">0</span></div>
    </div>
    <div class="glass-panel" style="border-left: 4px solid var(--red); padding: 15px;">
      <div class="chart-title" style="font-size:12px; margin-bottom:8px;">Total Expense</div>
      <div style="font-size: 24px; font-weight: 800; color: var(--red);">₹<span id="sumExpense">0</span></div>
    </div>
    <div class="glass-panel" style="border-left: 4px solid var(--blue); padding: 15px;">
      <div class="chart-title" style="font-size:12px; margin-bottom:8px;">Net Savings</div>
      <div style="font-size: 24px; font-weight: 800; color: var(--blue);">₹<span id="sumNet">0</span></div>
    </div>
  </div>

  <div class="dashboard-grid">
    <div class="glass-panel">
      <div class="chart-title">Income vs Expense</div>
      <div class="chart-container"><canvas id="donutChart"></canvas></div>
    </div>
    <div class="glass-panel" style="grid-column: span 2;">
      <div class="chart-title">Cash Flow Trend</div>
      <div class="chart-container"><canvas id="lineChart"></canvas></div>
    </div>
  </div>

  <div class="dashboard-grid">
    <div class="glass-panel">
      <div class="chart-title">Global Expense By User</div>
      <div class="chart-container"><canvas id="userExpenseChart"></canvas></div>
    </div>
    <div class="glass-panel" style="grid-column: span 2;">
      <div class="chart-title">Expense Category (Donut)</div>
      <div class="chart-container"><canvas id="catDonutChart"></canvas></div>
    </div>
  </div>

  <div class="dashboard-grid">
    <div class="glass-panel">
      <div class="chart-title" style="margin-bottom:10px;">Compare Two Users</div>
      <div style="display:flex; gap:6px; margin-bottom:12px;">
        <select id="compUser1" onchange="applyFilters()" style="flex:1; padding:6px; font-size:12px;"></select>
        <span style="color:var(--text-dim); font-size:12px; align-self:center; font-weight:bold;">VS</span>
        <select id="compUser2" onchange="applyFilters()" style="flex:1; padding:6px; font-size:12px;"></select>
      </div>
      <div class="chart-container" style="height:250px;"><canvas id="compareDonutChart"></canvas></div>
    </div>

    <div class="glass-panel" style="grid-column: span 2;">
      <div class="chart-title">Expense Category Comparison (Bar)</div>
      <div class="chart-container"><canvas id="barChart"></canvas></div>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <a href="index.html" class="nav-item"><i class="fa-solid fa-house nav-icon"></i><span class="nav-label">Home</span></a>
  <a href="index.html" class="nav-item"><i class="fa-solid fa-clock-rotate-left nav-icon"></i><span class="nav-label">History</span></a>
  <a href="index.html" class="nav-fab"><i class="fa-solid fa-plus"></i></a>
  <a href="index.html" class="nav-item"><i class="fa-solid fa-users nav-icon"></i><span class="nav-label">Users</span></a>
  <div class="nav-item active"><i class="fa-solid fa-chart-line nav-icon"></i><span class="nav-label">Graph</span></div>
</nav>

<script>
  let rawData = { transactions: [], users: [] };
  let charts = {};

  function toggleCustomDate() {
    const timeFilter = document.getElementById('timeFilter').value;
    const dateContainer = document.getElementById('customDateContainer');
    if (timeFilter === 'custom') {
      dateContainer.style.display = 'flex';
    } else {
      dateContainer.style.display = 'none';
      document.getElementById('startDate').value = '';
      document.getElementById('endDate').value = '';
    }
  }

  // Exact Theme and Font Syncing
  function applySavedTheme(settings) {
    try {
      if (settings) {
        if (settings.customBg) document.getElementById('app-background').style.backgroundImage = `url(${settings.customBg})`;
        if (settings.bgOpacity !== undefined) document.getElementById('app-background').style.opacity = settings.bgOpacity;
        
        if (settings.theme === 'light') {
          document.documentElement.setAttribute('data-theme', 'light');
        } else {
          document.documentElement.removeAttribute('data-theme');
        }
        
        const root = document.documentElement;
        if (settings.fontStyle === 'inter') {
          root.style.setProperty('--font-display', "'Inter', sans-serif");
          root.style.setProperty('--font-body', "'Inter', sans-serif");
        } else if (settings.fontStyle === 'poppins') {
          root.style.setProperty('--font-display', "'Poppins', sans-serif");
          root.style.setProperty('--font-body', "'Poppins', sans-serif");
        } else if (settings.fontStyle === 'roboto') {
          root.style.setProperty('--font-display', "'Roboto', sans-serif");
          root.style.setProperty('--font-body', "'Roboto', sans-serif");
        } else {
          root.style.setProperty('--font-display', "'Syne', sans-serif");
          root.style.setProperty('--font-body', "'DM Sans', sans-serif");
        }
      }
      if (window.innerWidth < 768) {
        const desktopBtn = document.querySelector('.desktop-only');
        if (desktopBtn) desktopBtn.style.display = 'none';
      }
    } catch(e) { console.error("Theme load error", e); }
  }

  // Listen for Cross-Tab data updates
  window.addEventListener('storage', (event) => {
    if (event.key === 'moneyProDB_v3' || event.key === 'moneyProDB_v2' || event.key === 'moneyProDB') {
      loadLocalDataAndRender();
    }
  });

  // Master Engine to link index.html perfectly to graph.html
  function loadLocalDataAndRender() {
    let localDB = {};
    try { localDB = JSON.parse(localStorage.getItem('moneyProDB_v3') || localStorage.getItem('moneyProDB_v2') || localStorage.getItem('moneyProDB') || '{}'); } catch(e) {}
    
    applySavedTheme(localDB.settings);

    let activeId = localDB.settings?.activeSheetId || 'default';
    let sheetUrl = new URLSearchParams(window.location.search).get('url');

    if (sheetUrl && localDB.settings?.sheets) {
      const matchedSheet = localDB.settings.sheets.find(s => s.url === sheetUrl);
      if (matchedSheet) activeId = matchedSheet.id;
    }

    let hasData = false;
    if (localDB.workspaces && localDB.workspaces[activeId]) {
      rawData.transactions = localDB.workspaces[activeId].transactions || [];
      rawData.users = localDB.workspaces[activeId].users || [];
      hasData = rawData.transactions.length > 0 || rawData.users.length > 0;
    } else if (localDB.transactions) {
      rawData.transactions = localDB.transactions || [];
      rawData.users = localDB.users || [];
      hasData = rawData.transactions.length > 0 || rawData.users.length > 0;
    }

    if (hasData) {
      populateFiltersAndRender();
      document.getElementById('loader').style.display = 'none';
      document.getElementById('main-content').style.display = 'block';
    }
    
    return { hasData, localDB, activeId, sheetUrl };
  }

  // Dual Sync process: Local immediately -> Cloud in the background
  async function fetchCloudData() {
    const { hasData, localDB, activeId, sheetUrl } = loadLocalDataAndRender();

    let finalUrl = sheetUrl;
    if (!finalUrl) {
      const activeSheet = localDB.settings?.sheets?.find(s => s.id === activeId);
      if (activeSheet && activeSheet.url) finalUrl = activeSheet.url;
    }

    if (finalUrl && navigator.onLine) {
      try {
        if (!hasData) document.getElementById('loader').style.display = 'flex';
        
        const pendingQueue = localDB.workspaces?.[activeId]?.syncQueue || localDB.syncQueue || [];
        
        const response = await fetch(finalUrl, {
          method: 'POST',
          body: JSON.stringify({ syncQueue: pendingQueue }),
          headers: { 'Content-Type': 'text/plain;charset=utf-8' }
        });
        const data = await response.json();
        
        if (data.status === 'success') {
          rawData.transactions = data.transactions || rawData.transactions;
          rawData.users = data.users || rawData.users;
          
          populateFiltersAndRender();
          document.getElementById('loader').style.display = 'none';
          document.getElementById('main-content').style.display = 'block';
          
          if (localDB.workspaces && localDB.workspaces[activeId]) {
            localDB.workspaces[activeId].transactions = rawData.transactions;
            localDB.workspaces[activeId].users = rawData.users;
            localDB.workspaces[activeId].syncQueue = [];
          } else {
            localDB.transactions = rawData.transactions;
            localDB.users = rawData.users;
            localDB.syncQueue = [];
          }
          if (!localDB.settings) localDB.settings = {};
          localDB.settings.lastSync = Date.now();
          localStorage.setItem('moneyProDB_v3', JSON.stringify(localDB));
        }
      } catch (err) {
        console.warn("Cloud sync failed. Utilizing local data.", err);
        if (!hasData) {
          alert("Error connecting to Google Sheet: " + err.message);
          document.getElementById('loader').innerHTML = '<h2>Failed to load data.</h2><button class="btn" onclick="window.location.href=\'index.html\'">Go Back</button>';
        }
      }
    } else if (!hasData) {
      document.getElementById('loader').innerHTML = '<h2>No Data Found.</h2><p style="text-align:center; font-size:12px; color:var(--text-dim);">Please add transactions or paste your sheet URL in the app first.</p><br><button class="btn" onclick="window.location.href=\'index.html\'">Go Back</button>';
    }
  }

  function populateFiltersAndRender() {
    const currUser = document.getElementById('userFilter').value;
    const currCat = document.getElementById('catFilter').value;
    
    populateUserFilter();
    populateCategoryFilter();
    
    if (document.querySelector(`#userFilter option[value="${currUser}"]`)) document.getElementById('userFilter').value = currUser;
    if (document.querySelector(`#catFilter option[value="${currCat}"]`)) document.getElementById('catFilter').value = currCat;
    
    applyFilters();
  }

  function getUserName(uid) {
    const u = rawData.users.find(x => x.id === uid);
    return u ? u.name : 'Unknown User';
  }

  function populateUserFilter() {
    const filter = document.getElementById('userFilter');
    const comp1 = document.getElementById('compUser1');
    const comp2 = document.getElementById('compUser2');
    
    const currU1 = comp1 ? comp1.value : null;
    const currU2 = comp2 ? comp2.value : null;
    
    let html = '<option value="all">All Users</option>';
    let compHtml = '';
    
    rawData.users.forEach(u => {
      html += `<option value="${u.id}">${u.name}</option>`;
      compHtml += `<option value="${u.id}">${u.name}</option>`;
    });

    filter.innerHTML = html;
    
    if (comp1) {
      comp1.innerHTML = compHtml;
      if (currU1 && document.querySelector(`#compUser1 option[value="${currU1}"]`)) {
          comp1.value = currU1;
      }
    }
    
    if (comp2) {
      comp2.innerHTML = compHtml;
      if (currU2 && document.querySelector(`#compUser2 option[value="${currU2}"]`)) {
          comp2.value = currU2;
      } else if (rawData.users.length > 1) {
          comp2.selectedIndex = 1; // Default to second user if exists
      }
    }
  }

  function populateCategoryFilter() {
    const filter = document.getElementById('catFilter');
    const categories = new Set();
    
    rawData.transactions.forEach(t => {
      if (t.type === 'expense' && t.category) {
        let label = t.category;
        if(label.startsWith('id_') || label.startsWith('custom_')) return; 
        categories.add(label);
      }
    });

    let html = '<option value="all">All Categories</option>';
    Array.from(categories).sort().forEach(c => {
      html += `<option value="${c}">${c}</option>`;
    });
    filter.innerHTML = html;
  }

  function applyFilters() {
    const user = document.getElementById('userFilter').value;
    const cat = document.getElementById('catFilter').value;
    const time = document.getElementById('timeFilter').value;
    
    let baseFiltered = rawData.transactions;

    // 1. Filter by Category (applies to both main charts and comparison chart)
    if (cat !== 'all') {
      baseFiltered = baseFiltered.filter(t => t.type === 'income' || t.category === cat);
    }

    // 2. Filter by Time (applies to both main charts and comparison chart)
    const now = new Date();
    const currYear = now.getFullYear();
    const currMonth = now.getMonth();
    const currDay = now.getDate();

    baseFiltered = baseFiltered.filter(t => {
      if (!t.date) return false;
      
      let tDateObj;
      if (t.date.includes('-')) {
        const dateParts = t.date.split('T')[0].split('-');
        tDateObj = new Date(parseInt(dateParts[0], 10), parseInt(dateParts[1], 10) - 1, parseInt(dateParts[2], 10));
      } else {
        tDateObj = new Date(t.date);
      }
      
      if (isNaN(tDateObj)) return false;

      const tYear = tDateObj.getFullYear();
      const tMonth = tDateObj.getMonth();
      const tDay = tDateObj.getDate();

      if (time === 'day') {
        return tYear === currYear && tMonth === currMonth && tDay === currDay;
      } else if (time === 'week') {
        const weekAgo = new Date(currYear, currMonth, currDay - 7);
        return tDateObj >= weekAgo;
      } else if (time === 'month') {
        return tYear === currYear && tMonth === currMonth;
      } else if (time === 'year') {
        return tYear === currYear;
      } else if (time === 'custom') {
        const startVal = document.getElementById('startDate').value;
        const endVal = document.getElementById('endDate').value;
        if (startVal && endVal) {
          const sParts = startVal.split('-');
          const sDate = new Date(parseInt(sParts[0],10), parseInt(sParts[1],10)-1, parseInt(sParts[2],10));
          const eParts = endVal.split('-');
          const eDate = new Date(parseInt(eParts[0],10), parseInt(eParts[1],10)-1, parseInt(eParts[2],10));
          return tDateObj >= sDate && tDateObj <= eDate;
        }
      }
      return true;
    });

    // 3. Filter by User (Applies ONLY to global charts, NOT the comparison chart)
    let finalFiltered = baseFiltered;
    if (user !== 'all') {
      finalFiltered = baseFiltered.filter(t => t.userId === user);
    }

    updateDashboard(finalFiltered, baseFiltered);
  }

  function updateDashboard(txs, baseTxs) {
    let sumInc = 0; let sumExp = 0;
    const timeline = {};
    const categories = {};
    const userExpenses = {}; 

    // Calculate main chart data
    txs.forEach(t => {
      const amt = parseFloat(t.amount) || 0;
      const dateStr = (t.date || '').split('T')[0];
      
      if (t.type === 'income') sumInc += amt;
      if (t.type === 'expense') {
        sumExp += amt;
        
        const cat = t.category || 'Other';
        categories[cat] = (categories[cat] || 0) + amt;

        const uname = getUserName(t.userId);
        userExpenses[uname] = (userExpenses[uname] || 0) + amt;
      }

      if (!timeline[dateStr]) timeline[dateStr] = { in: 0, out: 0 };
      if (t.type === 'income') timeline[dateStr].in += amt;
      if (t.type === 'expense') timeline[dateStr].out += amt;
    });

    // Calculate Compare Users data from baseTxs (ignoring global user filter)
    const u1Id = document.getElementById('compUser1').value;
    const u2Id = document.getElementById('compUser2').value;
    let u1Exp = 0, u2Exp = 0;
    
    baseTxs.forEach(t => {
      if (t.type === 'expense') {
        if (t.userId === u1Id) u1Exp += parseFloat(t.amount) || 0;
        if (t.userId === u2Id) u2Exp += parseFloat(t.amount) || 0;
      }
    });

    // Update UI Elements
    document.getElementById('sumIncome').textContent = sumInc.toLocaleString('en-IN');
    document.getElementById('sumExpense').textContent = sumExp.toLocaleString('en-IN');
    document.getElementById('sumNet').textContent = (sumInc - sumExp).toLocaleString('en-IN');

    // Render Charts
    renderDonutChart(sumInc, sumExp);
    renderLineChart(timeline);
    renderUserComparisonChart(userExpenses);
    renderBarChart(categories);
    renderCatDonutChart(categories);
    renderCompareUsersChart(u1Id, u1Exp, u2Id, u2Exp);
  }

  Chart.defaults.color = '#cbd5e1';
  Chart.defaults.font.family = "'DM Sans', sans-serif";

  function renderDonutChart(inc, exp) {
    const ctx = document.getElementById('donutChart');
    if (charts.donut) charts.donut.destroy();
    if (inc === 0 && exp === 0) inc = 0.001; 

    charts.donut = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: ['Income', 'Expense'],
        datasets: [{
          data: [inc, exp],
          backgroundColor: ['#34d399', '#fb7185'],
          borderWidth: 0,
          hoverOffset: 4
        }]
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } }, cutout: '70%' }
    });
  }

  function renderLineChart(timelineData) {
    const ctx = document.getElementById('lineChart');
    if (charts.line) charts.line.destroy();

    const sortedDates = Object.keys(timelineData).sort();
    const labels = sortedDates.map(d => {
      if(d.includes('-')) {
        const parts = d.split('-'); return `${parts[2]}/${parts[1]}`; 
      }
      return d;
    });
    
    const incData = sortedDates.map(d => timelineData[d].in);
    const expData = sortedDates.map(d => timelineData[d].out);

    charts.line = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [
          { label: 'Income', data: incData, borderColor: '#34d399', backgroundColor: 'rgba(52,211,153,0.1)', fill: true, tension: 0.4 },
          { label: 'Expense', data: expData, borderColor: '#fb7185', backgroundColor: 'rgba(251,113,133,0.1)', fill: true, tension: 0.4 }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        scales: { y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' } }, x: { grid: { display: false } } },
        interaction: { mode: 'index', intersect: false }
      }
    });
  }

  function renderUserComparisonChart(userExpData) {
    const ctx = document.getElementById('userExpenseChart');
    if (charts.userExp) charts.userExp.destroy();

    const users = Object.keys(userExpData);
    const values = users.map(u => userExpData[u]);
    const colors = ['#c084fc', '#fbbf24', '#34d399', '#60a5fa', '#fb7185'];

    charts.userExp = new Chart(ctx, {
      type: 'pie',
      data: {
        labels: users,
        datasets: [{
          data: values,
          backgroundColor: colors.slice(0, users.length),
          borderWidth: 0,
          hoverOffset: 4
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'bottom' } }
      }
    });
  }

  function renderCatDonutChart(catData) {
    const ctx = document.getElementById('catDonutChart');
    if (charts.catDonut) charts.catDonut.destroy();

    const sortedCats = Object.keys(catData).sort((a,b) => catData[b] - catData[a]);
    const values = sortedCats.map(c => catData[c]);
    const colors = ['#fb7185', '#60a5fa', '#34d399', '#fbbf24', '#c084fc', '#f472b6', '#38bdf8', '#4ade80', '#facc15', '#a78bfa', '#e879f9', '#2dd4bf'];

    charts.catDonut = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: sortedCats,
        datasets: [{
          data: values,
          backgroundColor: colors.slice(0, sortedCats.length),
          borderWidth: 0,
          hoverOffset: 4
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'right', labels: { boxWidth: 12 } } },
        cutout: '60%'
      }
    });
  }

  function renderBarChart(catData) {
    const ctx = document.getElementById('barChart');
    if (charts.bar) charts.bar.destroy();

    const sortedCats = Object.keys(catData).sort((a,b) => catData[b] - catData[a]);
    const values = sortedCats.map(c => catData[c]);

    charts.bar = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: sortedCats,
        datasets: [{
          label: 'Expenses',
          data: values,
          backgroundColor: '#60a5fa',
          borderRadius: 6
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        scales: { y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' } }, x: { grid: { display: false } } },
        plugins: { legend: { display: false } }
      }
    });
  }

  // --- NEW: Compare Two Users Doughnut Chart ---
  function renderCompareUsersChart(u1Id, u1Exp, u2Id, u2Exp) {
    const ctx = document.getElementById('compareDonutChart');
    if (charts.compareDonut) charts.compareDonut.destroy();

    const name1 = getUserName(u1Id) || 'User 1';
    const name2 = getUserName(u2Id) || 'User 2';

    // Prevent completely empty chart rendering error
    if (u1Exp === 0 && u2Exp === 0) { u1Exp = 0.001; } 

    charts.compareDonut = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: [name1, name2],
        datasets: [{
          data: [u1Exp, u2Exp],
          backgroundColor: ['#60a5fa', '#fbbf24'],
          borderWidth: 0,
          hoverOffset: 4
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'bottom' } },
        cutout: '65%'
      }
    });
  }

  window.onload = fetchCloudData;
</script>
</body>
</html>
